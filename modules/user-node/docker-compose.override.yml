services:
  user-node:
    extends:
      file: ../docker-compose.logger.override.yml
      service: logger
    environment:
      RECAPTCHA_OPTIONAL: "true"  # dev/test only: bypass reCAPTCHA (no browser tokens). Prod (base compose) leaves it unset -> config.js defaults to false -> calls Google.
    volumes:  # To allow dynamic reloading in dev
      # lib/shared
      - ${SEPAL_PROJECT_DIR}/lib/js/shared/src:/usr/local/src/sepal/lib/js/shared/src
      - ${SEPAL_PROJECT_DIR}/lib/js/shared/package.json:/usr/local/src/sepal/lib/js/shared/package.json
      - ${SEPAL_PROJECT_DIR}/modules/user-node/lib/shared/package-lock.json:/usr/local/src/sepal/lib/js/shared/package-lock.json
      - ${SEPAL_PROJECT_DIR}/modules/user-node/lib/shared/node_modules:/usr/local/src/sepal/lib/js/shared/node_modules
      # module
      - ${SEPAL_PROJECT_DIR}/modules/user-node:/usr/local/src/sepal/modules/user-node
