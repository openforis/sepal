services:
  jenkins:
    build:
      context: .
      dockerfile: jenkins.dockerfile
    image: jenkins
    container_name: jenkins
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - jenkins:/var/jenkins_home
    environment:
      CASC_JENKINS_CONFIG: /var/lib/jenkins/casc
      JENKINS_DOMAIN: "${OPS_DOMAIN}"
      JENKINS_PORT: "${JENKINS_PORT}"
      JENKINS_PASSWORD: "${JENKINS_PASSWORD}"
      DOCKER_REGISTRY_HOST: "${DOCKER_REGISTRY_HOST}"
      DOCKER_REGISTRY_USERNAME: "${DOCKER_REGISTRY_USERNAME}"
      DOCKER_REGISTRY_PASSWORD: "${DOCKER_REGISTRY_PASSWORD}"
    restart: always
    ulimits:
      core: 0
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8080"]
      start_period: 60s
      start_interval: 1s
      interval: 20s
      timeout: 5s
      retries: 3

  docker-registry:
    build:
      context: .
      dockerfile: registry.dockerfile
    image: docker-registry
    container_name: docker-registry
    volumes:
      - registry:/var/lib/registry
    restart: always
    ulimits:
      core: 0
    healthcheck:
      test: netstat -an | grep 5000
      start_period: 60s
      start_interval: 1s
      interval: 20s
      timeout: 5s
      retries: 3

  caddy:
    build:
      context: ../..
      dockerfile: ./modules/ops/caddy.dockerfile
    image: openforis/ops-caddy:latest
    container_name: caddy
    depends_on:
      jenkins:
        condition: service_healthy
      docker-registry:
        condition: service_healthy
    ports:
      - "80:80"                              # ACME HTTP-01 challenge
      - "${JENKINS_PORT}:${JENKINS_PORT}"
      - "443:443"
      - "443:443/udp"                        # HTTP/3 (QUIC)
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    restart: always
    environment:
      OPS_DOMAIN: "${OPS_DOMAIN}"
      JENKINS_PORT: "${JENKINS_PORT}"
      LETSENCRYPT_EMAIL: "${LETSENCRYPT_EMAIL}"
      DOCKER_REGISTRY_USERNAME: "${DOCKER_REGISTRY_USERNAME}"
      DOCKER_REGISTRY_PASSWORD: "${DOCKER_REGISTRY_PASSWORD}"
    ulimits:
      nproc: 65535
      nofile:
        soft: 65536
        hard: 65536
    sysctls:
      net.ipv4.tcp_keepalive_time: 60
      net.ipv4.tcp_keepalive_intvl: 60
      net.ipv4.tcp_keepalive_probes: 6
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      start_period: 60s
      start_interval: 1s
      interval: 20s
      timeout: 5s
      retries: 3

volumes:
  jenkins:
  registry:
  caddy_data:
  caddy_config:
